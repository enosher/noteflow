<svg viewBox="0 0 860 980" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="860" height="980" fill="#ffffff"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">NoteFlow — Page Flow</text>
  <text x="430" y="56" text-anchor="middle" font-size="12" fill="#64748b">Route map showing navigation between all M2 pages</text>

  <!-- Legend -->
  <rect x="30" y="72" width="16" height="16" rx="3" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="52" y="84" font-size="12" fill="#1f2937">Page / route</text>
  <path d="M170,72 l8,-8 l8,8 l-8,8 z" fill="#fef9c3" stroke="#854d0e" stroke-width="1.5"/>
  <text x="192" y="84" font-size="12" fill="#1f2937">Decision</text>
  <rect x="310" y="72" width="16" height="16" rx="3" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
  <text x="332" y="84" font-size="12" fill="#1f2937">Adapt feature</text>

  <!-- [/] -->
  <rect x="350" y="110" width="120" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="410" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">/</text>

  <!-- arrow down -->
  <line x1="410" y1="146" x2="410" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- diamond: logged in? -->
  <path d="M410,180 l52,28 l-52,28 l-52,-28 z" fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  <text x="410" y="211" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">logged in?</text>

  <!-- YES right to /dashboard -->
  <line x1="462" y1="208" x2="560" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="506" y="202" text-anchor="middle" font-size="11" fill="#475569">YES</text>
  <rect x="560" y="190" width="160" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="640" y="213" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">/dashboard</text>

  <!-- NO down to /login -->
  <line x1="410" y1="236" x2="410" y2="272" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="422" y="258" font-size="11" fill="#475569">NO</text>
  <rect x="350" y="272" width="120" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="410" y="295" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">/login</text>

  <!-- /signup -->
  <rect x="180" y="272" width="120" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="240" y="295" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">/signup</text>
  <!-- signup -> login -->
  <line x1="300" y1="290" x2="350" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="325" y="284" text-anchor="middle" font-size="10" fill="#475569">success</text>

  <!-- login -> dashboard (dashed) -->
  <path d="M470,290 Q520,290 520,208 L560,208" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="5,4"/>
  <text x="530" y="255" font-size="10" fill="#475569">success</text>

  <!-- dashboard -> /modules -->
  <line x1="640" y1="226" x2="640" y2="272" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="560" y="272" width="160" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="640" y="295" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">/modules</text>

  <!-- /modules/new off to the right -->
  <line x1="720" y1="290" x2="780" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="780" y="272" width="54" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="807" y="291" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">/new</text>

  <!-- /modules -> /modules/[id] -->
  <line x1="640" y1="308" x2="640" y2="354" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="354" width="200" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="640" y="377" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">/modules/[id]</text>

  <!-- /modules/[id]/edit off to right -->
  <line x1="740" y1="372" x2="780" y2="372" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="780" y="354" width="54" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="807" y="373" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">/edit</text>

  <!-- /modules/[id] -> /topics/new -->
  <line x1="640" y1="390" x2="640" y2="436" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="510" y="436" width="260" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="640" y="459" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">/topics/new</text>

  <!-- /topics/new -> /topics/[topicId] -->
  <line x1="640" y1="472" x2="640" y2="518" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="490" y="518" width="300" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="640" y="541" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">/topics/[topicId]</text>
  <text x="640" y="556" text-anchor="middle" font-size="10" fill="#64748b">(topic detail — hub page)</text>

  <!-- 4 branches off the topic hub -->
  <line x1="640" y1="562" x2="640" y2="590" stroke="#475569" stroke-width="1.5"/>
  <line x1="200" y1="590" x2="780" y2="590" stroke="#475569" stroke-width="1.5"/>

  <!-- /notes/new -->
  <line x1="240" y1="590" x2="240" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="150" y="626" width="180" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="240" y="649" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">/notes/new</text>

  <!-- /notes/import -->
  <line x1="460" y1="590" x2="460" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="360" y="626" width="200" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="460" y="644" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">/notes/import</text>
  <text x="460" y="657" text-anchor="middle" font-size="10" fill="#64748b">markdown paste</text>

  <!-- /questions/new -->
  <line x1="660" y1="590" x2="660" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="580" y="626" width="160" height="36" rx="6" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="660" y="649" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">/questions/new</text>

  <!-- /quiz (Adapt) -->
  <line x1="800" y1="590" x2="800" y2="626" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="748" y="626" width="104" height="36" rx="6" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="800" y="644" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">/quiz</text>
  <text x="800" y="657" text-anchor="middle" font-size="10" fill="#166534">Adapt ✦</text>

  <!-- quiz -> results -->
  <line x1="800" y1="662" x2="800" y2="698" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="738" y="698" width="124" height="36" rx="6" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="800" y="716" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">/quiz results</text>
  <text x="800" y="729" text-anchor="middle" font-size="10" fill="#166534">updates Track ✦</text>

  <!-- logout arrow from dashboard back to /login -->
  <path d="M560,208 Q60,208 60,290 L350,290" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="80" y="250" font-size="11" fill="#94a3b8">logout</text>

</svg>
